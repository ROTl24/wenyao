name: CI

on:
  push:
    branches: [main, master, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: 类型检查、测试与构建
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npm run typecheck

      - name: 完整测试
        run: npm test

      - name: 构建渲染层
        run: npm run build:renderer
